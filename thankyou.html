<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex"/>
<title>Thank You | The Kongu Times</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.thankyou-wrap{max-width:600px;margin:80px auto;padding:48px 32px;text-align:center;background:var(--white);border:1px solid var(--border);border-radius:12px;}
.thankyou-icon{font-size:56px;margin-bottom:20px;}
.thankyou-wrap h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);margin-bottom:12px;}
.thankyou-wrap p{font-size:15px;color:var(--ink-mid);line-height:1.7;margin-bottom:20px;}
.back-btn{display:inline-block;background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;padding:10px 24px;border-radius:6px;text-decoration:none;}
</style>
</head>
<body style="background:var(--paper);padding:20px;">
<div class="thankyou-wrap">
  <div class="thankyou-icon">✅</div>
  <h1>Message Sent!</h1>
  <p>Thank you for contacting The Kongu Times. We have received your message and will respond within 48 hours.</p>
  <p style="font-family:'Tiro Tamil',serif;font-size:16px;">உங்கள் செய்தி வெற்றிகரமாக அனுப்பப்பட்டது. 48 மணி நேரத்திற்குள் பதில் வழங்குவோம்.</p>
  <a href="index.html" class="back-btn">← Back to Home</a>
</div>
</body>
</html>
