name: Auto News Update (6-hourly)

on:
  schedule:
    # Runs every 6 hours (4 times/day)
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run news pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/auto-news.cjs

      - name: Commit and push updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Kongu Times Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🗞️ Auto news update — $(date +'%Y-%m-%d %H:%M IST')"
          git push

  deploy-pages:
    needs: update-news
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
